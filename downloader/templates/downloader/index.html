{% extends "downloader/base.html" %}

{% block content %}
  {% if error %}<div class="alert">{{ error }}</div>{% endif %}
  <form method="get" action="{% url 'formats' %}" class="card">
    <label for="url">Video URL</label>
    <input type="url" id="url" name="url" required
           placeholder="https://www.dailymotion.com/video/XXXXX"
           value="{{ url|default:'' }}">
    <button type="submit">Find formats →</button>
  </form>
  <p class="hint">Works with Dailymotion, Vimeo, and hundreds of other sites
     supported by yt-dlp.</p>
{% endblock %}
